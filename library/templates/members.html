{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">
    Members List
</h2>

<div class="mb-3">

    <a href="/add-member/"
       class="btn btn-dark">

        Add New Member

    </a>

</div>

<table class="table table-bordered table-striped">

    <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Phone</th>
        <th>Membership</th>
    </tr>

    {% for member in members %}

    <tr>
        <td>{{ member.id }}</td>
        <td>{{ member.user.username }}</td>
        <td>{{ member.phone }}</td>
        <td>{{ member.membership.membership_type }}</td>
    </tr>

    {% endfor %}

</table>

{% endblock %}
