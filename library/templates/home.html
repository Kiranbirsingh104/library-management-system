{% extends 'base.html' %}

{% block content %}

<h1 class="text-center mb-5">
    Welcome to Library Management System
</h1>

<div class="row">

    <div class="col-md-4">
        <div class="card shadow p-4 text-center">
            <h3>Total Books</h3>
            <h1>{{ total_books }}</h1>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card shadow p-4 text-center">
            <h3>Total Members</h3>
            <h1>{{ total_members }}</h1>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card shadow p-4 text-center">
            <h3>Issued Books</h3>
            <h1>{{ issued_books }}</h1>
        </div>
    </div>

</div>

{% endblock %}
