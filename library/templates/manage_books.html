{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">
    Manage Books
</h2>

<div class="mb-3">

    <a href="/add-book/"
       class="btn btn-dark">

        Add New Book

    </a>

</div>

<table class="table table-bordered table-striped">

    <tr>

        <th>ID</th>
        <th>Title</th>
        <th>Author</th>
        <th>Category</th>
        <th>Quantity</th>
        <th>Available</th>
        <th>Actions</th>

    </tr>

    {% for book in books %}

    <tr>

        <td>{{ book.id }}</td>

        <td>{{ book.title }}</td>

        <td>{{ book.author }}</td>

        <td>{{ book.category }}</td>

        <td>{{ book.quantity }}</td>

        <td>{{ book.available }}</td>

        <td>

            <a href="/edit-book/{{ book.id }}"
               class="btn btn-warning btn-sm">

                Edit

            </a>

            <a href="/delete-book/{{ book.id }}"
               class="btn btn-danger btn-sm">

                Delete

            </a>

        </td>

    </tr>

    {% endfor %}

</table>

{% endblock %}
