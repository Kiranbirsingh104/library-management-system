{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow p-4">

            <h2 class="text-center mb-4">
                Edit Book
            </h2>

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">
                    <label>Book Title</label>
                    <input type="text"
                           name="title"
                           value="{{ book.title }}"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label>Author</label>
                    <input type="text"
                           name="author"
                           value="{{ book.author }}"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label>Category</label>
                    <input type="text"
                           name="category"
                           value="{{ book.category }}"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label>Quantity</label>
                    <input type="number"
                           name="quantity"
                           value="{{ book.quantity }}"
                           class="form-control"
                           required>
                </div>

                <button type="submit"
                        class="btn btn-dark w-100">

                    Update Book

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
